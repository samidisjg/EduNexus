name: Services CI

on:
  pull_request:
    paths:
      - "Api-Gateway/**"
      - "library-service/**"
      - "fine-service/**"
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/services-sonarcloud.yml"
  push:
    branches:
      - main
    paths:
      - "Api-Gateway/**"
      - "library-service/**"
      - "fine-service/**"
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/services-sonarcloud.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: api-gateway
            working_directory: Api-Gateway
            image_name: api-gateway
          - service_name: library-service
            working_directory: library-service
            image_name: library-service
          - service_name: fine-service
            working_directory: fine-service
            image_name: fine-service

    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run Maven verify
        run: mvn -B verify

      - name: Build Docker image
        run: docker build -t ${{ matrix.image_name }}:${{ github.sha }} .
