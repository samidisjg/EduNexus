name: Services CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Api-Gateway/**"
      - "library-service/**"
      - "fine-service/**"
      - "UserService/**"
      - "StudentService/**"
      - "CourseService/**"
      - ".github/workflows/services-cd.yml"

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api_gateway:
              - 'Api-Gateway/**'
              - '.github/workflows/services-cd.yml'
            library_service:
              - 'library-service/**'
              - '.github/workflows/services-cd.yml'
            fine_service:
              - 'fine-service/**'
              - '.github/workflows/services-cd.yml'
            user_service:
              - 'UserService/**'
              - '.github/workflows/services-cd.yml'
            student_service:
              - 'StudentService/**'
              - '.github/workflows/services-cd.yml'
            course_service:
              - 'CourseService/**'
              - '.github/workflows/services-cd.yml'

      - name: Build deployment matrix
        id: set-matrix
        shell: bash
        run: |
          matrix='[]'

          add_service() {
            matrix=$(jq --arg service_name "$1" \
                        --arg working_directory "$2" \
                        --arg image_name "$3" \
                        --arg container_app_name "$4" \
                        --arg target_port "$5" \
                        --arg ingress "$6" \
                        '. + [{
                          service_name: $service_name,
                          working_directory: $working_directory,
                          image_name: $image_name,
                          container_app_name: $container_app_name,
                          target_port: $target_port,
                          ingress: $ingress
                        }]' <<<"$matrix")
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.api_gateway }}" = "true" ]; then
            add_service "api-gateway" "Api-Gateway" "edunexus-api-gateway" "edunexus-api-gateway" "8081" "external"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.library_service }}" = "true" ]; then
            add_service "library-service" "library-service" "edunexus-library-service" "edunexus-library-service" "8083" "internal"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.fine_service }}" = "true" ]; then
            add_service "fine-service" "fine-service" "edunexus-fine-service" "edunexus-fine-service" "8084" "internal"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.user_service }}" = "true" ]; then
            add_service "user-service" "UserService" "edunexus-user-service" "edunexus-user-service" "9091" "internal"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.student_service }}" = "true" ]; then
            add_service "student-service" "StudentService" "edunexus-student-service" "edunexus-student-service" "9095" "internal"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.course_service }}" = "true" ]; then
            add_service "course-service" "CourseService" "edunexus-course-service" "edunexus-course-service" "9096" "internal"
          fi

          if [ "$matrix" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

          compact_matrix=$(jq -c --argjson include "$matrix" '{include: $include}' <<< '{}')
          echo "matrix=$compact_matrix" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    env:
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
      AZURE_CONTAINERAPPS_ENV: ${{ vars.AZURE_CONTAINERAPPS_ENV }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Azure configuration
        shell: bash
        run: |
          missing=0
          for key in AZURE_RESOURCE_GROUP AZURE_CONTAINER_REGISTRY AZURE_CONTAINERAPPS_ENV AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is not configured."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: bash
        run: az acr login --name "$AZURE_CONTAINER_REGISTRY"

      - name: Build and deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/${{ matrix.working_directory }}
          acrName: ${{ env.AZURE_CONTAINER_REGISTRY }}
          containerAppName: ${{ matrix.container_app_name }}
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: ${{ env.AZURE_CONTAINERAPPS_ENV }}
          imageToBuild: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.image_name }}:${{ env.IMAGE_TAG }}
          targetPort: ${{ matrix.target_port }}
          ingress: ${{ matrix.ingress }}
