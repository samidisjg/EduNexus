name: Frontend CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cd.yml"

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
      AZURE_CONTAINERAPPS_ENV: ${{ vars.AZURE_CONTAINERAPPS_ENV }}
      AZURE_GATEWAY_BASE_URL: ${{ vars.AZURE_GATEWAY_BASE_URL }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Azure configuration
        shell: bash
        run: |
          missing=0
          for key in AZURE_RESOURCE_GROUP AZURE_CONTAINER_REGISTRY AZURE_CONTAINERAPPS_ENV AZURE_GATEWAY_BASE_URL AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is not configured."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: bash
        run: az acr login --name "$AZURE_CONTAINER_REGISTRY"

      - name: Build and deploy frontend to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          acrName: ${{ env.AZURE_CONTAINER_REGISTRY }}
          containerAppName: edunexus-web
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: ${{ env.AZURE_CONTAINERAPPS_ENV }}
          imageToBuild: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/edunexus-web:${{ env.IMAGE_TAG }}
          buildArguments: |
            "VITE_API_BASE_URL=${{ env.AZURE_GATEWAY_BASE_URL }}"
          targetPort: "80"
          ingress: external
