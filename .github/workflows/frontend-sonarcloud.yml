name: Frontend SonarCloud

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-sonarcloud.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-sonarcloud.yml"

jobs:
  sonarcloud:
    if: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_FRONTEND_PROJECT_KEY != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_FRONTEND_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.test.js,src/**/*.test.jsx,src/**/*.spec.js,src/**/*.spec.jsx
            -Dsonar.exclusions=dist/**,node_modules/**,public/**,coverage/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
