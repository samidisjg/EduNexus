spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:studentservice;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

services:
  course-service:
    base-url: http://localhost:9096
