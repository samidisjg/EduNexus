version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: user-service-mysql
    env_file:
      - ../.env.common
      - ./.env.user-service
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - user-service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  user-service:
    build: .
    container_name: user-service-app
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ../.env.common
      - ./.env.user-service
    ports:
      - "9091:9091"
    networks:
      - user-service-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  user-service-network:
    driver: bridge
