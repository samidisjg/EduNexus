version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: user-service-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: user_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - user-service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  user-service:
    build: .
    container_name: user-service-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: user_db
      DB_USERNAME: root
      DB_PASSWORD: 12345678
      SERVER_PORT: 9091
      JWT_SECRET: your-secret-key-change-this-in-production-at-least-256-bit-long
      JWT_EXPIRATION: 3600000
    ports:
      - "9091:9091"
    networks:
      - user-service-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  user-service-network:
    driver: bridge

