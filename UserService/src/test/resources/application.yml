spring:
  datasource:
    url: jdbc:h2:mem:userservice;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

server:
  port: 0

jwt:
  secret: test-jwt-secret-key-for-user-service-ci-only-2026
  expiration: 3600000
  refresh-expiration: 86400000
