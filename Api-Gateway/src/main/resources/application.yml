server:
  port: 8081

user:
  service:
    url: http://localhost:9091/user-service

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:9091
          predicates:
            - Path=/api-gateway/user-service/**
          filters:
            - StripPrefix=1

        - id: student-service
          uri: http://localhost:9095
          predicates:
            - Path=/api-gateway/students-service/**
          filters:
            - StripPrefix=1

        - id: course-service
          uri: http://localhost:9096
          predicates:
            - Path=/api-gateway/course-service/**
          filters:
            - StripPrefix=1

      open-endpoints:
        - /api-gateway/user-service/auth/sign-up
        - /api-gateway/user-service/auth/sign-in


  main:
    web-application-type: reactive